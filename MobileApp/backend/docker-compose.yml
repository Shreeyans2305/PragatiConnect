version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_TABLE_USERS=${DYNAMODB_TABLE_USERS:-pragati-users}
      - DYNAMODB_TABLE_CONVERSATIONS=${DYNAMODB_TABLE_CONVERSATIONS:-pragati-conversations}
      - DYNAMODB_TABLE_ESTIMATES=${DYNAMODB_TABLE_ESTIMATES:-pragati-estimates}
      - S3_BUCKET_IMAGES=${S3_BUCKET_IMAGES:-pragati-images}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
      - BEDROCK_KNOWLEDGE_BASE_ID=${BEDROCK_KNOWLEDGE_BASE_ID}
      - JWT_SECRET=${JWT_SECRET:-dev_secret_change_me}
      - OTP_MOCK_MODE=${OTP_MOCK_MODE:-true}
      - DEBUG=${DEBUG:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - ./app:/app/app  # Hot reload during development
    depends_on:
      - dynamodb-local
    networks:
      - pragati-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - pragati-network

networks:
  pragati-network:
    driver: bridge
