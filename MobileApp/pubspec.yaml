name: pragati_connect
description: "Pragati Connect - Empowering India's Informal Workforce"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.6
  flutter_markdown: ^0.7.6
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  record: ^6.1.1
  http: ^1.2.2
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  provider: ^6.1.2
  audioplayers: ^6.1.0
  appwrite: 21.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - indian_schemes_informal_workers_expanded.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  remove_alpha_ios: true
